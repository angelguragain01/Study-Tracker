<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Architects+Daughter&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='110' fill='%231C1917'/%3E%3Cpath d='M256 140C200 140 150 165 115 205V365C150 335 200 320 256 320C312 320 362 335 397 365V205C362 165 312 140 256 140Z' fill='none' stroke='%23FCFCFA' stroke-width='28' stroke-linecap='round' stroke-linejoin='round'/%3E%3Cpath d='M256 140V320' stroke='%23FCFCFA' stroke-width='28' stroke-linecap='round'/%3E%3Cpath d='M330 210L365 245L410 175' fill='none' stroke='%2310B981' stroke-width='28' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
</head>
<body>

    <button id="theme-toggle" class="theme-toggle" title="Toggle Dark Mode">
        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5"/>
            <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/>
        </svg>
        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
    </button>

    <header class="header">
        <div class="container header-content">
            <div class="header-left">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                    </svg>
                    <h1>Study Tracker</h1>
                </div>
                <p class="subtitle">Organize your coursework and track your progress.</p>
            </div>
            <div class="sticky-notes" id="sticky-notes"></div>
        </div>
    </header>

    <nav class="nav-tabs">
        <div class="container">
            <div id="nav-tabs"></div>
        </div>
    </nav>

    <main class="container">
        <div id="view-home" class="view"></div>
        <div id="view-subject" class="view"></div>
    </main>

    <script src="script.js"></script>
    <div id="notification" class="notification">
    <div class="notification-content">
        <div class="notification-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <div class="notification-text" id="notification-message">Success!</div>
    </div>
</div>
</body>
</html>
